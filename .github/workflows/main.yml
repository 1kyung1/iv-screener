name: IV Collector

on:
  push:   # ✅ 이 줄 추가 (핵심)
  schedule:
    - cron: "0 21 * * *"   # 한국시간 오전 6시 실행
  workflow_dispatch:


jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 라이브러리 설치
        run: |
          pip install pandas requests

      - name: 실행
        run: python iv_collector.py
