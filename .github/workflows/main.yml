name: IV Collector

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 라이브러리 설치
        run: |
          pip install pandas requests alpaca-py html5lib yfinance exchange_calendars

      - name: Python 실행
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python iv_collector.py

      - name: CSV 저장 & 푸시
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # ✅ 1. 새로 생성된 CSV 임시 보관 (git reset 전에)
          cp iv_data_*.csv /tmp/     2>/dev/null || true
          cp market_data_*.csv /tmp/ 2>/dev/null || true
          cp failed_symbols.txt /tmp/ 2>/dev/null || true

          # ✅ 2. 원격 최신 상태로 동기화
          git fetch origin main
          git reset --hard origin/main

          # ✅ 3. 임시 보관한 신규 데이터 복원
          cp /tmp/iv_data_*.csv .     2>/dev/null || true
          cp /tmp/market_data_*.csv . 2>/dev/null || true
          cp /tmp/failed_symbols.txt . 2>/dev/null || true

          # ✅ 4. 모든 CSV 커밋 & 푸시
          git add iv_data_*.csv      || true
          git add market_data_*.csv  || true
          git add failed_symbols.txt || true
          git add iv_data.csv        || true
          git diff --staged --quiet || git commit -m "IV data $(date +'%Y-%m-%d')"
          git push origin main
